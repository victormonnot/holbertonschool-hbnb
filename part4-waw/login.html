<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in &mdash; Horizon</title>
  <link rel="stylesheet" href="static/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <!-- Navigation (minimal) -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__brand">
        <div class="nav__brand-icon">H</div>
        Horizon
      </a>
      <div class="nav__links">
        <a href="index.html" class="nav__link">Explore</a>
      </div>
    </div>
  </nav>

  <!-- Auth Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-card__header">
        <div class="auth-card__icon">H</div>
        <h1 class="auth-card__title">Welcome back</h1>
        <p class="auth-card__subtitle">Sign in to your Horizon account</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <div id="form-error" class="form-error" style="display:none; margin-bottom:16px;"></div>

        <button type="submit" class="btn btn--primary btn--lg" style="width:100%;" id="submit-btn">
          Sign in
        </button>
      </form>
    </div>
  </main>

  <script src="static/scripts/auth.js"></script>
  <script src="static/scripts/api.js"></script>
  <script src="static/scripts/utils.js"></script>
  <script src="static/scripts/login.js"></script>
</body>
</html>
