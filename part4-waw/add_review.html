<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Review &mdash; Horizon</title>
  <link rel="stylesheet" href="static/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__brand">
        <div class="nav__brand-icon">H</div>
        Horizon
      </a>
      <div class="nav__links">
        <a href="index.html" class="nav__link">Explore</a>
        <a href="login.html" class="nav__link" id="nav-login">Sign in</a>
        <button class="nav__link nav__link--cta" id="nav-logout" style="display:none" onclick="handleLogout()">Log out</button>
      </div>
    </div>
  </nav>

  <!-- Review Form -->
  <main class="review-form-page">
    <div class="container">
      <a href="#" class="place-detail__back" id="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to place
      </a>

      <div class="review-form-card">
        <h2 class="place-detail__section-title" style="margin-bottom:8px;">Write a Review</h2>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:32px;">Share your experience with others</p>

        <!-- Place info (loaded dynamically) -->
        <div id="place-info"></div>

        <form id="review-form" novalidate>
          <!-- Rating -->
          <div class="form-group">
            <label class="form-label">Your rating</label>
            <div class="rating-select">
              <div class="star-rating" id="star-rating">
                <svg class="star-rating__star" data-value="1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <svg class="star-rating__star" data-value="2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <svg class="star-rating__star" data-value="3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <svg class="star-rating__star" data-value="4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <svg class="star-rating__star" data-value="5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
              </div>
              <span class="rating-select__label" id="rating-label">-</span>
            </div>
          </div>

          <!-- Review text -->
          <div class="form-group">
            <label class="form-label" for="review-text">Your review</label>
            <textarea
              id="review-text"
              class="form-input"
              placeholder="Tell us about your stay. What made it special? Any tips for future guests?"
              required
            ></textarea>
          </div>

          <div id="form-error" class="form-error" style="display:none; margin-bottom:16px;"></div>

          <div style="display:flex;gap:12px;">
            <button type="submit" class="btn btn--primary btn--lg" style="flex:1;" id="submit-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Submit Review
            </button>
            <a href="#" class="btn btn--secondary btn--lg" id="cancel-btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__brand">Horizon</span>
        <p class="footer__copy">&copy; 2025 Horizon &mdash; HBnB Project. Crafted with care.</p>
      </div>
    </div>
  </footer>

  <script src="static/scripts/auth.js"></script>
  <script src="static/scripts/api.js"></script>
  <script src="static/scripts/utils.js"></script>
  <script src="static/scripts/add_review.js"></script>
</body>
</html>
