<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Details &mdash; Horizon</title>
  <link rel="stylesheet" href="static/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__brand">
        <div class="nav__brand-icon">H</div>
        Horizon
      </a>
      <div class="nav__links">
        <a href="index.html" class="nav__link">Explore</a>
        <a href="login.html" class="nav__link" id="nav-login">Sign in</a>
        <button class="nav__link nav__link--cta" id="nav-logout" style="display:none" onclick="handleLogout()">Log out</button>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="place-detail">
    <div class="container">
      <!-- Back -->
      <a href="index.html" class="place-detail__back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to all places
      </a>

      <!-- Hero skeleton -->
      <div id="place-hero">
        <div class="skeleton skeleton--hero"></div>
      </div>

      <!-- Content grid -->
      <div id="place-content">
        <div class="place-detail__grid">
          <div>
            <div class="skeleton skeleton--title"></div>
            <div class="skeleton skeleton--text"></div>
            <div class="skeleton skeleton--text"></div>
            <div class="skeleton skeleton--text-sm"></div>
          </div>
          <div>
            <div class="skeleton" style="height: 300px; border-radius: var(--radius-lg);"></div>
          </div>
        </div>
      </div>

      <!-- Reviews -->
      <div id="reviews-section"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__brand">Horizon</span>
        <div class="footer__links">
          <a href="#" class="footer__link">About</a>
          <a href="#" class="footer__link">Terms</a>
          <a href="#" class="footer__link">Privacy</a>
        </div>
        <p class="footer__copy">&copy; 2025 Horizon &mdash; HBnB Project. Crafted with care.</p>
      </div>
    </div>
  </footer>

  <script src="static/scripts/auth.js"></script>
  <script src="static/scripts/api.js"></script>
  <script src="static/scripts/utils.js"></script>
  <script src="static/scripts/place.js"></script>
</body>
</html>
